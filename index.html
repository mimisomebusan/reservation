<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="dark only">
<meta name="supported-color-schemes" content="dark only">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Reservation · MIMISOME BUSAN</title>
<meta name="description" content="MIMISOME BUSAN — Book your consultation in your language.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>

<!-- Latin display: EB Garamond Italic (Reservation title) + Bodoni Moda (MIMISOME wordmark); per-script CJK display fonts for native typography -->
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;1,6..96,400;1,6..96,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Shippori+Mincho:wght@400;500;600&family=Noto+Serif+JP:wght@400;500;600&family=Noto+Serif+TC:wght@400;500;600&family=Noto+Serif+SC:wght@400;500;600&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">

<style>
/* ============================================================
   MIMISOME RESERVATION — Cinematic Threshold
   Dark ink + paper text + orange-light accents
   Aligned with botox detail page design system v7
   ============================================================ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

:root{
  /* Brand */
  --orange:        #E26A0F;
  --orange-deep:   #B5530A;
  --orange-light:  #FF8E3C;
  --orange-soft:   rgba(255,142,60,0.4);

  /* Canvas */
  --paper:         #FAF8F4;
  --paper-dim:     rgba(250,248,244,0.78);
  --paper-mute:    rgba(250,248,244,0.5);
  --paper-faint:   rgba(250,248,244,0.32);

  /* Dark — charcoal */
  --ink:           #1A1714;
  --ink-2:         #211D19;
  --ink-3:         #2D2924;

  /* Type */
  --f-display:     "Bodoni Moda","Bodoni 72","Didot",Georgia,serif;
  --f-italic:      "EB Garamond","Cormorant Garamond",Georgia,serif;
  --f-kr:          "Gowun Batang","Noto Serif KR",serif;
  --f-body:        "Pretendard","Apple SD Gothic Neo","Noto Sans",sans-serif;

  --ease:          cubic-bezier(.16,1,.3,1);
  --ease-out:      cubic-bezier(0.25,0.46,0.45,0.94);
}

html,body{
  color-scheme:dark only;
  height:100%;
  overflow:hidden;
  background:var(--ink);
}
body{
  font-family:var(--f-body);
  color:var(--paper);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  min-height:100dvh;
  padding:32px 20px;
  position:relative;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}

/* ── Atmosphere — cosmic mist rising from below.
   Inspired by Gemini's deep-void aurora; translated into our
   warm orange / charcoal palette. Top 60% stays near-black;
   bottom blooms with layered ember-light that breathes slowly,
   never aggressive, always atmospheric.
   ─────────────────────────────────────────────── */
.atmos{
  position:fixed;inset:0;
  pointer-events:none;z-index:0;
  overflow:hidden;
}

/* Base wash — deep ember haze, sits low and contained.
   The void above must dominate (75%+); the light only whispers
   from below. Slow side-drift keeps it alive without drawing
   attention. */
.atmos__bloom{
  position:absolute;
  bottom:-15%;left:50%;
  width:150vw;height:90vh;
  transform:translateX(-50%);
  background:
    radial-gradient(ellipse 65% 38% at 50% 100%,
      rgba(181,83,10,0.28)   0%,
      rgba(181,83,10,0.18)   15%,
      rgba(181,83,10,0.10)   32%,
      rgba(181,83,10,0.04)   50%,
      transparent            72%);
  filter:blur(16px);
  animation:bloomDrift 22s ease-in-out infinite;
}

/* Inner core — concentrated ember, slightly brighter at the source.
   Sits very low; reaches only into the bottom third. */
.atmos__core{
  position:absolute;
  bottom:-8%;left:50%;
  width:120vw;height:55vh;
  transform:translateX(-50%);
  background:
    radial-gradient(ellipse 50% 35% at 50% 100%,
      rgba(226,106,15,0.20)  0%,
      rgba(226,106,15,0.10)  20%,
      rgba(226,106,15,0.04)  42%,
      transparent            65%);
  filter:blur(14px);
  animation:coreBreathe 14s ease-in-out infinite;
}

/* Aura — barely-there warm wash, the highest reach of the light.
   Just enough to soften the transition into pure black. */
.atmos__aura{
  position:absolute;
  bottom:0;left:50%;
  width:100vw;height:40vh;
  transform:translateX(-50%);
  background:
    radial-gradient(ellipse 40% 50% at 50% 100%,
      rgba(255,142,60,0.07)  0%,
      rgba(255,142,60,0.03)  35%,
      transparent            65%);
  filter:blur(10px);
  animation:auraShift 18s ease-in-out infinite reverse;
}

/* Top vignette — deepens the upper void.
   The dark must dominate; this enforces it. */
.atmos__top{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 120% 70% at 50% 0%,
      rgba(0,0,0,0.45) 0%,
      rgba(0,0,0,0.15) 50%,
      transparent 80%);
}

/* Edge vignette — keeps the bloom centered, fades sides to ink. */
.atmos__edges{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 130% 110% at 50% 70%,
      transparent 55%,
      rgba(26,23,20,0.18) 82%,
      rgba(26,23,20,0.38) 100%);
}

/* Paper grain — multiplies depth, prevents "flat dark" feel.
   Slightly stronger now to texture the bloom (uneven luminosity
   reads as cosmic mist, not flat gradient). */
.atmos__grain{
  position:absolute;inset:0;
  opacity:0.05;
  mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='280' height='280'><filter id='n'><feTurbulence baseFrequency='0.85' seed='3'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
}

/* ── Cosmic-mist animations — slow, decoupled cycles
   so the bloom never looks mechanical or pulsing.
   Each layer drifts on its own rhythm; the eye reads it
   as ambient atmosphere, not animation. ───────────── */
@keyframes bloomDrift{
  0%,100% { transform:translateX(-50%) translateY(0)   scale(1);    opacity:1; }
  33%     { transform:translateX(-48%) translateY(-8px) scale(1.04); opacity:0.92; }
  66%     { transform:translateX(-52%) translateY(4px)  scale(0.98); opacity:1.05; }
}
@keyframes coreBreathe{
  0%,100% { transform:translateX(-50%) scale(1);    opacity:1; }
  50%     { transform:translateX(-50%) scale(1.08); opacity:0.78; }
}
@keyframes auraShift{
  0%,100% { transform:translateX(-50%) translateY(0)    scale(1);    opacity:0.9; }
  50%     { transform:translateX(-50%) translateY(-12px) scale(1.06); opacity:1.1; }
}

/* Reduced motion — kill drift entirely for users who prefer stillness */
@media (prefers-reduced-motion: reduce){
  .atmos__bloom, .atmos__core, .atmos__aura{ animation:none; }
}

/* ── Container ─────────────────────────────────── */
.stage{
  position:relative;z-index:1;
  width:100%;
  max-width:380px;
  text-align:center;
  display:flex;flex-direction:column;
  align-items:center;
  animation:stageIn 1.2s var(--ease) both;
}
@keyframes stageIn{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

/* ── Brand block — top ─────────────────────────── */
.brand{
  display:flex;flex-direction:column;align-items:center;
  margin-bottom:30px;
  opacity:0;
  animation:rise 1s var(--ease) 0.15s forwards;
}
.brand__monogram{
  width:auto;height:34px;
  margin-bottom:14px;
  /* White logo — no filter needed; opacity gives soft "paper" feel on dark */
  opacity:0.96;
}
.brand__wordmark{
  font-family:'Bodoni Moda','Bodoni 72','Didot',serif;
  font-weight:400;
  font-size:15px;
  letter-spacing:0.30em;
  text-indent:0.30em;     /* compensate for trailing letter-spacing so wordmark visually centers */
  text-transform:uppercase;
  color:var(--paper);
  margin-bottom:8px;
  opacity:0.92;
  font-optical-sizing:auto;   /* let Bodoni Moda pick a display-tuned optical size */
  /* Subtle text-shadow gives the wordmark a refined "engraved" presence on dark */
  text-shadow:0 0 28px rgba(250,248,244,0.06);
}
.brand__locale{
  font-family:var(--f-body);
  font-size:8.5px;font-weight:500;
  letter-spacing:0.34em;
  color:var(--orange-light);
  opacity:0.85;
}

/* ── Hairline divider ──────────────────────────── */
.hairline{
  width:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--orange-light) 50%,transparent);
  margin-bottom:22px;
  opacity:0;
  animation:hairlineExpand 1.1s var(--ease) 0.5s forwards;
}
@keyframes hairlineExpand{
  to{opacity:0.55;width:72px;}
}

/* ── Eyebrow — multilingual welcome, vertical rise from below ─────
   Each phrase rises up from below into the visible band, then drifts
   upward out of view as the next phrase rises in from below.
   This vertical motion respects the page's overall top-to-bottom
   composition, evokes an arrival-board / hotel-lobby cadence, and
   completely sidesteps the CJK-character collision problem that
   horizontal flow had when 繁體 and 简體 crossed.
   No flanking rules — the motion IS the decoration. ─────────── */
.eyebrow{
  position:relative;
  height:24px;            /* slightly taller than text so descenders never clip */
  width:100%;
  max-width:280px;
  margin-bottom:18px;
  overflow:hidden;        /* clip slide-in/out so phrases don't leak above/below */
  opacity:0;
  animation:rise 1s var(--ease) 0.7s forwards;
}
.eyebrow__slot{
  position:absolute;
  top:0;left:0;right:0;
  display:flex;
  align-items:center;     /* vertically center text in 24px band */
  justify-content:center;
  height:100%;
  white-space:nowrap;
  pointer-events:none;
  /* DEFAULT (waiting below): off-screen down, invisible */
  transform:translateY(24px);
  opacity:0;
  transition:
    transform 1.3s cubic-bezier(0.65, 0, 0.35, 1),
    opacity   1.3s cubic-bezier(0.65, 0, 0.35, 1);
  font-style:italic;
  font-weight:400;
  letter-spacing:0.04em;
  color:var(--orange-light);
  font-size:13px;
  line-height:1;
}
/* ACTIVE: risen into center, visible */
.eyebrow__slot.active{
  transform:translateY(0);
  opacity:0.88;
}
/* EXITING: drifting up out of view, invisible */
.eyebrow__slot.exiting{
  transform:translateY(-24px);
  opacity:0;
}

.eyebrow__slot.en{font-family:var(--f-italic);font-style:italic;letter-spacing:0.06em;}
.eyebrow__slot.ko{font-family:var(--f-kr);font-style:normal;font-size:12px;letter-spacing:0.08em;}
.eyebrow__slot.jp{font-family:"Shippori Mincho","Noto Serif JP",serif;font-style:normal;font-size:12px;letter-spacing:0.06em;}
.eyebrow__slot.tw{font-family:"Noto Serif TC",serif;font-style:normal;font-size:12px;letter-spacing:0.08em;}
.eyebrow__slot.cn{font-family:"Noto Serif SC",serif;font-style:normal;font-size:12px;letter-spacing:0.08em;}

/* ── Hero title — Bodoni Moda Italic
   Same family as MIMISOME wordmark — chic didone unity.
   High-fashion editorial feel, sharper than EB Garamond. ── */
.hero{
  font-family:var(--f-display);
  font-style:italic;
  font-weight:400;
  font-size:48px;
  line-height:1.04;
  letter-spacing:-0.012em;
  color:var(--paper);
  margin-bottom:10px;
  font-optical-sizing:auto;
  opacity:0;
  animation:rise 1.2s var(--ease) 0.9s forwards;
  /* Subtle paper-glow for depth on dark */
  text-shadow:0 1px 40px rgba(250,248,244,0.06);
}

/* ── Subtitle ──────────────────────────────────── */
.subtitle{
  font-family:var(--f-italic);
  font-style:italic;
  font-weight:400;
  font-size:12px;
  letter-spacing:0.08em;
  color:var(--paper-mute);
  margin-bottom:36px;
  opacity:0;
  animation:rise 1s var(--ease) 1.15s forwards;
}

/* ── Bracketed language list ───────────────────── */
.menu{
  position:relative;
  width:100%;
  padding:22px 22px;
  opacity:0;
  animation:rise 1.1s var(--ease) 1.35s forwards;
}
.menu__bracket{
  position:absolute;
  width:14px;height:14px;
  border:1px solid var(--orange-light);
  opacity:0.5;
  transition:opacity 0.6s var(--ease);
}
.menu__bracket--tl{top:0;left:0;border-width:1px 0 0 1px;}
.menu__bracket--tr{top:0;right:0;border-width:1px 1px 0 0;}
.menu__bracket--bl{bottom:0;left:0;border-width:0 0 1px 1px;}
.menu__bracket--br{bottom:0;right:0;border-width:0 1px 1px 0;}
.menu:hover .menu__bracket{opacity:0.85;}

.lang-list{
  display:flex;flex-direction:column;
  align-items:center;
  gap:0;
}
.lang-item{
  position:relative;
  display:block;
  width:100%;
  padding:11px 12px;
  min-height:42px;
  cursor:pointer;
  text-decoration:none;
  opacity:1;
  transition:opacity 0.55s var(--ease-out);
}

/* Sibling-fade — Aesop's signature pattern preserved.
   Only an actual <a> (linkable) item triggers the fade; hovering the
   disabled English <div> does nothing — neither it nor its siblings change. */
.lang-list:has(a.lang-item:hover) .lang-item:not(:hover){opacity:0.32;}
.lang-list:has(.lang-item.selected) .lang-item:not(.selected){opacity:0.15;}

.lang-name{
  position:relative;
  display:block;
  font-size:20px;
  color:var(--paper-mute);
  transition:all 0.55s var(--ease-out);
}

/* Per-script display fonts — each language label in its native typography */
.lang-item.ko .lang-name{
  font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  font-style:normal;font-weight:400;letter-spacing:0.05em;
}
.lang-item.en .lang-name{
  font-family:var(--f-italic);
  font-style:italic;font-weight:500;letter-spacing:-0.005em;
}
.lang-item.jp .lang-name{
  font-family:'Shippori Mincho','Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif;
  font-style:normal;font-weight:400;letter-spacing:0.04em;
}
.lang-item.cn .lang-name{
  font-family:'Noto Serif SC','Source Han Serif CN','PingFang SC',serif;
  font-style:normal;font-weight:400;letter-spacing:0.05em;
}
.lang-item.tw .lang-name{
  font-family:'Noto Serif TC','Source Han Serif TC','PingFang TC',serif;
  font-style:normal;font-weight:400;letter-spacing:0.05em;
}

/* OPTICAL compensation — CJK serif glyphs fill the em-square more densely
   than Latin italic / Hangul sans, so drop -2px to balance visual weight */
.lang-item.jp .lang-name,
.lang-item.cn .lang-name,
.lang-item.tw .lang-name{font-size:18px;}

/* Hover state — size up + paper color (full luminance) + soft orange whisper */
.lang-item:hover .lang-name,
.lang-item:active .lang-name{
  color:var(--paper);
  font-size:22px;
}
.lang-item.jp:hover .lang-name,.lang-item.jp:active .lang-name,
.lang-item.cn:hover .lang-name,.lang-item.cn:active .lang-name,
.lang-item.tw:hover .lang-name,.lang-item.tw:active .lang-name{font-size:20px;}

/* Selected — the choice ignites orange */
.lang-item.selected .lang-name{
  color:var(--orange-light);
  font-size:24px;
}
.lang-item.jp.selected .lang-name,
.lang-item.cn.selected .lang-name,
.lang-item.tw.selected .lang-name{font-size:22px;}

/* ── Signature line — bottom ───────────────────── */
.signature{
  margin-top:36px;
  display:flex;flex-direction:column;
  align-items:center;gap:6px;
  opacity:0;
  animation:rise 1s var(--ease) 1.7s forwards;
}
.signature__rule{
  width:24px;height:1px;
  background:var(--paper-faint);
}

.signature__year{
  font-family:var(--f-italic);
  font-style:italic;
  font-size:9px;
  letter-spacing:0.28em;
  color:var(--paper-faint);
  text-transform:uppercase;
  margin-top:2px;
}
.signature__text{
  font-family:var(--f-italic);
  font-style:italic;
  font-size:11px;
  letter-spacing:0.18em;
  color:var(--paper-faint);
  text-transform:uppercase;
}

/* ── Animations ─────────────────────────────────── */
@keyframes rise{
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:translateY(0);}
}

/* ── Exit transition ───────────────────────────── */
.stage.leaving{
  animation:stageOut 0.7s cubic-bezier(0.55,0.085,0.68,0.53) forwards;
}
@keyframes stageOut{
  to{opacity:0;transform:translateY(-12px);}
}

/* ── Responsive ─────────────────────────────────── */
@media(hover:none){
  .lang-item:active .lang-name{color:var(--paper);font-size:22px;}
}
@media(max-width:380px){
  .stage{max-width:320px;}
  .hero{font-size:42px;}
  .brand__wordmark{width:108px;}
  .eyebrow::before{left:-26px;width:16px;}
  .eyebrow::after{right:-26px;width:16px;}
}
@media(max-height:680px){
  .brand{margin-bottom:24px;}
  .hairline{margin-bottom:18px;}
  .eyebrow{margin-bottom:14px;}
  .hero{font-size:40px;margin-bottom:8px;}
  .subtitle{margin-bottom:28px;}
  .signature{margin-top:26px;}
}
</style>
</head>
<body>

<!-- ── Atmosphere — cosmic mist rising from below ──── -->
<div class="atmos">
  <div class="atmos__bloom"></div>
  <div class="atmos__core"></div>
  <div class="atmos__aura"></div>
  <div class="atmos__top"></div>
  <div class="atmos__edges"></div>
  <div class="atmos__grain"></div>
</div>

<!-- ── Main stage ────────────────────────────────── -->
<div class="stage" id="stage">

  const INTERVAL = TRANSITION + SETTLED;

  let i = 0;
  function step(){
    const current = slots[i];
    current.classList.remove('active');
    current.classList.add('exiting');   // start drifting left

    i = (i + 1) % slots.length;
    const next = slots[i];
    next.classList.add('active');       // start flowing in from right

    // After the leaving slot is fully gone, snap it back to "waiting" position
    // (off-screen right at 28px) so it can re-enter next time without flicker.
    setTimeout(() => { current.classList.remove('exiting'); }, TRANSITION + 50);
  }

  setInterval(step, INTERVAL);
})();

/* ── Language click → fade siblings → navigate ─── */
function go(e, el){
  e.preventDefault();
  const url = el.getAttribute('href');
  el.classList.add('selected');
  // Brief pause to register the ignition, then fade stage out, then navigate.
  setTimeout(function(){
    document.getElementById('stage').classList.add('leaving');
  }, 340);
  setTimeout(function(){
    window.location.href = url;
  }, 880);
}
</script>
